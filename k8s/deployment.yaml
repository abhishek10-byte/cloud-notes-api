apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-notes-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-notes-api
  template:
    metadata:
      labels:
        app: cloud-notes-api
    spec:
      containers:
      - name: cloud-notes-api
        image: abhishekcloud10/cloud-notes-api:v2
        ports:
        - containerPort: 5000

